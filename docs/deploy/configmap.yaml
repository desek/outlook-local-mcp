# ConfigMap for non-secret Outlook Local MCP Server configuration.
#
# These values are injected as environment variables via envFrom in the
# Deployment. Adjust values to match your organization's requirements.

apiVersion: v1
kind: ConfigMap
metadata:
  name: outlook-local-mcp-config
  labels:
    app: outlook-local-mcp
data:
  OUTLOOK_MCP_TENANT_ID: "common"
  OUTLOOK_MCP_DEFAULT_TIMEZONE: "UTC"
  OUTLOOK_MCP_LOG_LEVEL: "info"
  OUTLOOK_MCP_LOG_FORMAT: "json"
  OUTLOOK_MCP_CACHE_NAME: "outlook-local-mcp"
  OUTLOOK_MCP_AUTH_METHOD: "device_code"  # auth_code (default) requires a browser; use device_code for headless/container environments
  OUTLOOK_MCP_AUTH_RECORD_PATH: "/data/auth/auth_record.json"
