# Secret template for sensitive Outlook Local MCP Server configuration.
#
# The default CLIENT_ID is Microsoft Office's first-party client ID, which is
# not secret. This Secret template exists for organizations that register a
# custom Entra ID application and want to keep their client ID out of the
# ConfigMap.
#
# Replace the placeholder value with your base64-encoded client ID:
#   echo -n "your-client-id" | base64

apiVersion: v1
kind: Secret
metadata:
  name: outlook-local-mcp-secret
  labels:
    app: outlook-local-mcp
type: Opaque
data:
  # Base64 of "d3590ed6-52b3-4102-aeff-aad2292ab01c" (default Microsoft Office client ID).
  # Replace with your organization's custom app registration client ID.
  OUTLOOK_MCP_CLIENT_ID: ZDM1OTBlZDYtNTJiMy00MTAyLWFlZmYtYWFkMjI5MmFiMDFj
