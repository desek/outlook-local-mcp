<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Terminal window -->
  <rect x="48" y="48" width="416" height="416" rx="32" ry="32" fill="#0078D4"/>

  <!-- Title bar -->
  <rect x="48" y="48" width="416" height="56" rx="32" ry="32" fill="#005A9E"/>
  <rect x="48" y="80" width="416" height="24" fill="#005A9E"/>

  <!-- Traffic light dots -->
  <circle cx="88" cy="76" r="8" fill="#FF6058"/>
  <circle cx="116" cy="76" r="8" fill="#FFC02E"/>
  <circle cx="144" cy="76" r="8" fill="#27CA40"/>

  <!-- Terminal body -->
  <rect x="72" y="120" width="368" height="320" rx="8" ry="8" fill="#0A1628"/>

  <!-- Prompt line: > _ -->
  <text x="96" y="168" font-family="ui-monospace,monospace" font-size="28" font-weight="700" fill="#00ADD8">$</text>
  <text x="124" y="168" font-family="ui-monospace,monospace" font-size="22" fill="#94A3B8">outlook-mcp</text>

  <!-- Blinking cursor -->
  <rect x="296" y="150" width="12" height="24" rx="2" ry="2" fill="#00ADD8" opacity="0.8"/>

  <!-- Divider -->
  <line x1="96" y1="188" x2="416" y2="188" stroke="#1E3A5F" stroke-width="1"/>

  <!-- Calendar grid 3x4 -->
  <!-- Row 1 -->
  <rect x="108" y="208" width="64" height="48" rx="6" ry="6" fill="#122240"/>
  <rect x="184" y="208" width="64" height="48" rx="6" ry="6" fill="#122240"/>
  <rect x="260" y="208" width="64" height="48" rx="6" ry="6" fill="#122240"/>
  <rect x="336" y="208" width="64" height="48" rx="6" ry="6" fill="#122240"/>

  <!-- Row 2 -->
  <rect x="108" y="268" width="64" height="48" rx="6" ry="6" fill="#122240"/>
  <rect x="184" y="268" width="64" height="48" rx="6" ry="6" fill="#122240"/>
  <rect x="260" y="268" width="64" height="48" rx="6" ry="6" fill="#0078D4"/>
  <rect x="336" y="268" width="64" height="48" rx="6" ry="6" fill="#122240"/>

  <!-- Row 3 -->
  <rect x="108" y="328" width="64" height="48" rx="6" ry="6" fill="#122240"/>
  <rect x="184" y="328" width="64" height="48" rx="6" ry="6" fill="#122240"/>
  <rect x="260" y="328" width="64" height="48" rx="6" ry="6" fill="#122240"/>
  <rect x="336" y="328" width="64" height="48" rx="6" ry="6" fill="#122240"/>

  <!-- Date numbers -->
  <text x="118" y="240" font-family="ui-monospace,monospace" font-size="18" fill="#475569">5</text>
  <text x="194" y="240" font-family="ui-monospace,monospace" font-size="18" fill="#475569">6</text>
  <text x="270" y="240" font-family="ui-monospace,monospace" font-size="18" fill="#475569">7</text>
  <text x="346" y="240" font-family="ui-monospace,monospace" font-size="18" fill="#475569">8</text>

  <text x="114" y="300" font-family="ui-monospace,monospace" font-size="18" fill="#475569">12</text>
  <text x="190" y="300" font-family="ui-monospace,monospace" font-size="18" fill="#475569">13</text>
  <text x="266" y="300" font-family="ui-monospace,monospace" font-size="18" font-weight="700" fill="#fff">14</text>
  <text x="342" y="300" font-family="ui-monospace,monospace" font-size="18" fill="#475569">15</text>

  <text x="114" y="360" font-family="ui-monospace,monospace" font-size="18" fill="#475569">19</text>
  <text x="190" y="360" font-family="ui-monospace,monospace" font-size="18" fill="#475569">20</text>
  <text x="266" y="360" font-family="ui-monospace,monospace" font-size="18" fill="#475569">21</text>
  <text x="342" y="360" font-family="ui-monospace,monospace" font-size="18" fill="#475569">22</text>

  <!-- Event bars on some cells -->
  <rect x="184" y="246" width="40" height="4" rx="2" ry="2" fill="#00ADD8" opacity="0.6"/>
  <rect x="260" y="306" width="48" height="4" rx="2" ry="2" fill="#F59E0B"/>
  <rect x="108" y="366" width="36" height="4" rx="2" ry="2" fill="#00ADD8" opacity="0.6"/>
  <rect x="336" y="246" width="32" height="4" rx="2" ry="2" fill="#27CA40" opacity="0.6"/>

  <!-- Day headers -->
  <text x="126" y="202" font-family="ui-monospace,monospace" font-size="11" fill="#4A6A8A">MO</text>
  <text x="202" y="202" font-family="ui-monospace,monospace" font-size="11" fill="#4A6A8A">TU</text>
  <text x="275" y="202" font-family="ui-monospace,monospace" font-size="11" fill="#4A6A8A">WE</text>
  <text x="351" y="202" font-family="ui-monospace,monospace" font-size="11" fill="#4A6A8A">TH</text>
</svg>
