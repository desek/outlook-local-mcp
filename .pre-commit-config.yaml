repos:
  - repo: local
    hooks:
      - id: make-build
        name: go build
        entry: make build
        language: system
        pass_filenames: false
        types: [go]
      - id: make-vet
        name: go vet
        entry: make vet
        language: system
        pass_filenames: false
        types: [go]
      - id: make-fmt-check
        name: gofmt check
        entry: make fmt-check
        language: system
        pass_filenames: false
        types: [go]
      - id: make-lint
        name: golangci-lint
        entry: make lint
        language: system
        pass_filenames: false
        types: [go]
      - id: make-test
        name: go test
        entry: make test
        language: system
        pass_filenames: false
        types: [go]
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]
