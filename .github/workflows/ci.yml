name: CI
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Install libsecret
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      - name: Run CI checks
        run: make ci
      - name: Release dry-run
        run: goreleaser build --snapshot --clean --single-target --id desktop
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  test-cgo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Install libsecret
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      - name: Run auth tests with CGO
        run: CGO_ENABLED=1 go test ./internal/auth/...

  test-nocgo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Run auth tests without CGO
        run: CGO_ENABLED=0 go test ./internal/auth/...
